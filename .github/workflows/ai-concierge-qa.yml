name: AI Concierge QA

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"
  push:
    branches: [main]
    paths:
      - "app/api/ai-assistant/**"
      - "components/ai/**"
      - "lib/ai-assistant/**"
      - "scripts/qa-ai-concierge.mjs"
      - ".github/workflows/ai-concierge-qa.yml"

permissions:
  contents: read

jobs:
  run-ai-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for production deployment
        if: github.event_name == 'push'
        run: sleep 120

      - name: Run all AI scenarios and collect findings
        env:
          AI_QA_BASE_URL: https://chioshotel.gr
          AI_QA_TIMEOUT_MS: 30000
        run: |
          set +e
          npm run qa:ai
          qa_exit=$?
          echo "QA completed with script exit code ${qa_exit}. All scenario findings were collected in the JSON report."
          exit 0

      - name: Publish QA summary
        if: always()
        run: |
          if [ -f qa-results/ai-concierge-report.json ]; then
            node -e 'const fs=require("fs"); const r=JSON.parse(fs.readFileSync("qa-results/ai-concierge-report.json","utf8")); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## AI Concierge QA\n\n- Total scenarios: ${r.total}\n- Passed: ${r.passed}\n- Errors found: ${r.failed}\n- Report: ai-concierge-qa-report artifact\n`);'
          else
            echo "## AI Concierge QA" >> "$GITHUB_STEP_SUMMARY"
            echo "No JSON report was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-concierge-qa-report
          path: qa-results/ai-concierge-report.json
          if-no-files-found: warn
          retention-days: 30
