name: Normalize Footer CTA Color

on:
  push:
    branches:
      - fix-header-footer-compact
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize-footer:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-header-footer-compact
          persist-credentials: true

      - name: Normalize dark footer CTA text
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('components/VoulamandisFooterTailwind.tsx')
          text = path.read_text(encoding='utf-8')
          updated = text.replace('!!text-stone-900', '!text-stone-900')
          updated = updated.replace(' tracking-[0.08em] text-stone-900 shadow-lg', ' tracking-[0.08em] !text-stone-900 shadow-lg')
          path.write_text(updated, encoding='utf-8')
          PY

      - name: Commit footer fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/VoulamandisFooterTailwind.tsx
          git commit -m "Fix footer booking CTA text contrast"
          git push origin HEAD:fix-header-footer-compact
