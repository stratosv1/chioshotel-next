name: Patch AI back navigation
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch component
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('components/ai/ConversationalRoomSalesEnhanced.tsx')
          s=p.read_text(encoding='utf-8')
          marker='const BREAKFAST_IMAGE = "/images/welcome/voulamandis-breakfast.jpg";'
          block='''const BACK_LABELS: Record<Language, string> = {\n el: "Επιστροφή στο site", en: "Back to site", de: "Zurück zur Website", fr: "Retour au site", it: "Torna al sito", es: "Volver al sitio", tr: "Siteye dön",\n};\nfunction homeHref(language: Language) { return language === "en" ? "/" : `/${language}/`; }\n'''
          if 'const BACK_LABELS:' not in s:
              s=s.replace(marker,block+'\n'+marker,1)
          old='''    <div className="mx-auto flex max-w-3xl items-center gap-3 px-4 py-3.5">\n     <div className="relative h-11 w-11 overflow-hidden rounded-full ring-1 ring-stone-200"><Image src="/images/welcome/voulamandis-welcome-hero.webp" alt="Voulamandis House" fill sizes="44px" className="object-cover"/></div>\n     <div className="min-w-0 flex-1"><h1 className="truncate text-[17px] font-semibold">Voulamandis House</h1><div className="mt-0.5 flex items-center gap-1.5 text-xs text-stone-500"><span className="h-2 w-2 rounded-full bg-emerald-500"/>AI Room Finder · Live availability</div></div>\n     {step!=="language"?<button onClick={reset} className="rounded-full border border-stone-300 bg-white px-3 py-2 text-xs font-semibold shadow-sm">↻</button>:null}\n    </div>'''
          new='''    <div className="mx-auto flex max-w-3xl items-center gap-2 px-3 py-3 sm:gap-3 sm:px-4 sm:py-3.5">\n     <a href={homeHref(language)} aria-label={BACK_LABELS[language]} title={BACK_LABELS[language]} className="inline-flex h-10 shrink-0 items-center gap-2 rounded-full border border-stone-300 bg-white px-3 text-sm font-semibold text-stone-700 shadow-sm transition hover:bg-stone-50 active:scale-[.98] sm:h-11 sm:px-4"><span aria-hidden="true" className="text-lg leading-none">←</span><span className="hidden sm:inline">{BACK_LABELS[language]}</span></a>\n     <a href={homeHref(language)} aria-label="Voulamandis House" className="relative h-10 w-10 shrink-0 overflow-hidden rounded-full ring-1 ring-stone-200 sm:h-11 sm:w-11"><Image src="/images/welcome/voulamandis-welcome-hero.webp" alt="Voulamandis House" fill sizes="44px" className="object-cover"/></a>\n     <div className="min-w-0 flex-1"><h1 className="truncate text-[15px] font-semibold sm:text-[17px]">Voulamandis House</h1><div className="mt-0.5 flex items-center gap-1.5 truncate text-[11px] text-stone-500 sm:text-xs"><span className="h-2 w-2 shrink-0 rounded-full bg-emerald-500"/>AI Room Finder · Live availability</div></div>\n     {step!=="language"?<button onClick={reset} aria-label="Restart" className="rounded-full border border-stone-300 bg-white px-3 py-2 text-xs font-semibold shadow-sm">↻</button>:null}\n    </div>'''
          if new not in s:
              if old not in s: raise SystemExit('Header pattern not found')
              s=s.replace(old,new,1)
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/ai/ConversationalRoomSalesEnhanced.tsx
          git commit -m "Add back-to-site navigation to AI assistant"
          git push origin HEAD:main
