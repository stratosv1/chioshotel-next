name: Fix Footer CTA Color

on:
  push:
    branches:
      - fix-header-footer-compact
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-footer:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-header-footer-compact
          persist-credentials: true

      - name: Force dark footer CTA text
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('components/VoulamandisFooterTailwind.tsx')
          text = path.read_text(encoding='utf-8')
          old = 'text-stone-900 shadow-lg shadow-black/10'
          new = '!text-stone-900 shadow-lg shadow-black/10'
          if old not in text:
              raise SystemExit('Expected footer CTA class not found')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit footer fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/VoulamandisFooterTailwind.tsx
          git commit -m "Fix footer booking CTA text contrast"
          git push origin HEAD:fix-header-footer-compact
