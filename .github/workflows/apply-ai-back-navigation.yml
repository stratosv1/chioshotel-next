name: Apply AI back navigation

on:
  push:
    branches: [main]
    paths:
      - ".github/ai-back-navigation-trigger"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch AI assistant component
        run: node scripts/patch-ai-back-navigation.cjs
      - name: Commit component change
        run: |
          if git diff --quiet; then
            echo "No component change needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/ai/ConversationalRoomSalesEnhanced.tsx
          git commit -m "Add back-to-site navigation to AI assistant"
          git push origin HEAD:main
