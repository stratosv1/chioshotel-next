name: Normalize occupancy cron route

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set 7-minute cron with trailing slash
        id: patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('vercel.json')
          content = path.read_text(encoding='utf-8')
          old = '"path":"/api/staff/calendar/occupancy-sync","schedule":"*/7 * * * *"'
          new = '"path":"/api/staff/calendar/occupancy-sync/","schedule":"*/7 * * * *"'

          if new in content:
              print('Cron route already includes the trailing slash.')
              Path('/tmp/cron_changed').write_text('no')
          elif old in content:
              path.write_text(content.replace(old, new, 1), encoding='utf-8')
              print('Added trailing slash to the occupancy cron route.')
              Path('/tmp/cron_changed').write_text('yes')
          else:
              raise SystemExit('Expected 7-minute occupancy cron entry was not found; no file was changed.')
          PY
          echo "changed=$(cat /tmp/cron_changed)" >> "$GITHUB_OUTPUT"

      - name: Commit route normalization to main
        if: steps.patch.outputs.changed == 'yes'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vercel.json
          git commit -m "Use trailing slash for occupancy cron route"
          git push origin HEAD:main
