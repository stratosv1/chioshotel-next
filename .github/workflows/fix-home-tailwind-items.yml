name: Fix Home Tailwind Data Fields

on:
  push:
    branches:
      - integrate-localized-css-main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-fields:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integrate-localized-css-main
          fetch-depth: 0

      - name: Replace invalid homepage data fields
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('components/home/HomePageTailwindV2.tsx')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'data.intro.right.items.map((item) => (': 'data.intro.right.cards.map((item) => (',
              'data.roomsPreview.subtitle': 'data.roomsPreview.text',
          }

          updated = text
          for old, new in replacements.items():
              updated = updated.replace(old, new)

          if updated == text:
              print('Homepage data fields already fixed or not found.')
          else:
              path.write_text(updated, encoding='utf-8')
              print('Updated invalid homepage data field references.')
          PY

      - name: Commit correction
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/home/HomePageTailwindV2.tsx
          git commit -m "Fix Tailwind homepage data fields"
          git push origin HEAD:integrate-localized-css-main
