name: SEO Preview Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee build.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-preview-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail when build fails
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
